services:
  # Frontend
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.optimized.Dockerfile
      args:
        - VITE_API_BASE_URL=/api
        - VITE_ML_SERVICE_URL=/api/ml
        - VITE_WS_URL=
    container_name: spheroseg-frontend
    ports:
      # Loopback only — the app is served publicly via nginx (443), which
      # reaches this container over the docker network (frontend:80). This
      # host port is debug access and must not be internet-facing.
      - '127.0.0.1:4000:80'
    networks:
      - spheroseg-network
    environment:
      - NODE_ENV=production
    restart: always
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:80/health']
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend API
  backend:
    build:
      context: .
      dockerfile: docker/backend.optimized.Dockerfile
    container_name: spheroseg-backend
    env_file: .env.production
    ports:
      # Loopback only — nginx proxies the API over the docker network
      # (backend:3001). Exposing 4001 publicly bypassed TLS + rate limiting.
      - '127.0.0.1:4001:3001'
    networks:
      - spheroseg-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Core settings that must be in environment section
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3001
      - UPLOAD_DIR=/app/uploads
      - ENABLE_TRACING=false
      # Database password from shell environment
      - DB_PASSWORD=${DB_PASSWORD}
      # Queue processing — default 1 to prevent concurrent multipart request errors
      - QUEUE_MAX_CONCURRENT_BATCHES=${QUEUE_MAX_CONCURRENT_BATCHES:-1}
      - QUEUE_PARALLEL_PROCESSING_ENABLED=true
      - DATABASE_CONNECTION_POOL_SIZE=50
      - WS_PARALLEL_PROCESSING_ENABLED=true
      # Automated Essays worker (batch MT assay). Reached over the docker network.
      - ESSAYS_SERVICE_URL=${ESSAYS_SERVICE_URL:-http://essays:8000}
    volumes:
      - ./backend/uploads/blue:/app/uploads
      - ./backend/data:/app/data
      - ./logs/backend:/app/logs
    restart: always
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 1G
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001/health']
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: spheroseg-postgres
    networks:
      - spheroseg-network
    environment:
      - POSTGRES_USER=spheroseg
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=spheroseg
    volumes:
      - postgres_blue_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U spheroseg -d spheroseg']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: spheroseg-redis
    networks:
      - spheroseg-network
    volumes:
      - redis_blue_data:/data
    restart: always
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ML Service - 2-way parallel processing with 8GB GPU limit
  ml:
    build:
      context: .
      dockerfile: docker/ml.optimized.Dockerfile
    container_name: spheroseg-ml
    runtime: nvidia
    # 1 worker to free GPU memory for Maptimize
    command:
      [
        'uvicorn',
        'api.main:app',
        '--host',
        '0.0.0.0',
        '--port',
        '8000',
        '--workers',
        '1',
        '--limit-concurrency',
        '100',
        '--timeout-keep-alive',
        '30',
      ]
    ports:
      # Loopback only. The ML FastAPI service has NO auth layer; the backend
      # and nginx reach it over the docker network (ml:8000). A public 4008
      # let anyone drive the shared GPU unauthenticated — critical exposure.
      - '127.0.0.1:4008:8000'
    networks:
      - spheroseg-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://spheroseg:${DB_PASSWORD}@postgres:5432/spheroseg
      - REDIS_URL=redis://redis:6379
      # Sequential processing - single worker for 8GB GPU limit safety
      - ML_INFERENCE_WORKERS=${ML_INFERENCE_WORKERS:-1}
      - ML_ENABLE_PARALLEL_INFERENCE=${ML_ENABLE_PARALLEL_INFERENCE:-false}
      - ML_MAX_CONCURRENT_USERS=${ML_MAX_CONCURRENT_USERS:-1}
      # Microtubule v7 (DINOv3-L + DPT) needs ~7-8 GB for a single 1024x1024
      # forward pass; the previous 8 GB cap tripped CUDA OOM. 14 GB leaves
      # room on the shared A5000 (24 GB total) for the other tenant.
      - ML_MEMORY_LIMIT_GB=${ML_MEMORY_LIMIT_GB:-14}
      - ML_ENABLE_CUDA_STREAMS=true
      - GPU_MEMORY_WARNING_THRESHOLD=90
      - GPU_MEMORY_CRITICAL_THRESHOLD=95
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # High priority GPU settings for SpheroSeg
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:512,garbage_collection_threshold:0.6
      - CUDA_LAUNCH_BLOCKING=0
      - ML_GPU_PRIORITY=high
      # Microtubule v7 requires a HuggingFace token to download the gated
      # DINOv3 ViT-L/16 backbone (~1.1 GB) on first model load. Read from
      # .env.production at compose time so the token isn't baked into the
      # image. Absent token → microtubule model fails to load (other
      # models unaffected).
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - ./backend/segmentation/weights:/app/weights:ro
      - ./backend/segmentation/sperm_final/best_model.pth:/app/sperm_final/best_model.pth:ro
      - ./backend/uploads/blue:/app/uploads
      # Persist HuggingFace cache across container restarts so the 1.1 GB
      # DINOv3 backbone download survives `docker compose down`.
      - ./backend/segmentation/.hf-cache:/home/app/.cache/huggingface
    restart: always
    deploy:
      resources:
        limits:
          memory: 12G # Increased for sperm model (2.1GB model + ConvNeXt backbone)
          cpus: '4.0' # Explicit CPU allocation
        reservations:
          memory: 6G # Increased for sperm model
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import requests; requests.get('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # Automated Essays worker — batch microtubule assay of ND2 wells via
  # AutomatedEssaysModule (cloned at image build). Shares the GPU with `ml` but
  # is guarded (start-gate on free VRAM + per-process memory cap) so a batch
  # never OOMs interactive segmentation. Loopback-only + NO auth layer — only the
  # backend reaches it over the docker network (essays:8000). Build with
  # `make build-essays` (supplies the gh token as a BuildKit secret + re-clones
  # the module so upstream changes propagate).
  essays:
    build:
      context: .
      dockerfile: docker/essays.Dockerfile
      args:
        ML_IMAGE: cell-segmentation-hub-ml:latest
        MODULE_REF: ${ESSAYS_MODULE_REF:-main}
        MODULE_CACHE_BUST: ${ESSAYS_MODULE_CACHE_BUST:-0}
      secrets:
        - ghtoken
    image: cell-segmentation-hub-essays:latest
    container_name: spheroseg-essays
    runtime: nvidia
    # Run as the backend's uid:gid (nodejs 1001) so the worker can write into the
    # job dirs the backend creates on the shared uploads volume (status.json +
    # output/). HOME=/tmp keeps any home-dir writes (matplotlib/torch cache) off
    # the image's 1000-owned home when running under a different uid.
    user: '1001:1001'
    command: ['uvicorn', 'essays_api:app', '--host', '0.0.0.0', '--port', '8000', '--workers', '1']
    ports:
      # Loopback only — no auth on the worker; the backend calls it over the
      # docker network (essays:8000). A public port would let anyone drive the
      # shared GPU unauthenticated.
      - '127.0.0.1:4009:8000'
    networks:
      - spheroseg-network
    environment:
      - PYTHONUNBUFFERED=1
      - HOME=/tmp
      - MPLCONFIGDIR=/tmp/mpl
      # GPU guard: only start a batch when >=13 GB is free (a v7 forward peaks
      # ~12.5 GB); cap this process at 0.6 of the 24 GB card so it can never grab
      # the whole GPU. Tuned against a real well recording.
      - ESSAYS_GPU_MIN_FREE_GB=${ESSAYS_GPU_MIN_FREE_GB:-13}
      - ESSAYS_GPU_MEM_FRACTION=${ESSAYS_GPU_MEM_FRACTION:-0.6}
      - ESSAYS_GPU_WAIT_TIMEOUT_S=${ESSAYS_GPU_WAIT_TIMEOUT_S:-1800}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      # Reuse the byte-identical microtubule_v7.pt already on disk (no download).
      - ./backend/segmentation/weights:/app/mt_weights:ro
      # Same host uploads dir the backend writes to — the FS handoff for job I/O.
      - ./backend/uploads/blue:/app/uploads
    restart: always
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import requests; requests.get('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:alpine
    container_name: spheroseg-nginx
    volumes:
      - ./docker/nginx/nginx-main.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/nginx.production.conf:/etc/nginx/conf.d/nginx.active.conf:ro
      - ./docker/nginx/snippets:/etc/nginx/snippets:ro
      - ./backend/uploads:/app/uploads:ro
      # SSL certificates for production
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Persistent logs for IT audit trail
      - ./logs/nginx:/var/log/nginx
    ports:
      - '80:80'
      - '443:443'
    depends_on:
      - frontend
      - backend
      - ml
    networks:
      - spheroseg-network
      - maptimize-network
    restart: always
    healthcheck:
      test: ['CMD', 'nginx', '-t']
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  spheroseg-network:
    driver: bridge
    name: spheroseg
  maptimize-network:
    external: true
    name: maptimize-network

volumes:
  postgres_blue_data:
    name: spheroseg_postgres_blue
  redis_blue_data:
    name: spheroseg_redis_blue

secrets:
  # gh token for cloning the private AutomatedEssaysModule at build time. Written
  # by `make build-essays` (gitignored) and only read during the essays image
  # build — never used at runtime, never baked into a layer.
  ghtoken:
    file: ${ESSAYS_GH_TOKEN_FILE:-./.essays_ghtoken}
