name: CI

# Merge gate for pull requests into main (and a post-merge check on main).
# Runs the full type/lint/i18n checks PLUS the now-green Vitest suites with
# coverage enforcement, so a PR that breaks tests or drops coverage below the
# configured threshold (vitest.config.ts / backend, 80% floor) fails the check.
#
# To make this BLOCK merges, add "CI / frontend" and "CI / backend" as required
# status checks in the repo's branch-protection rules for main.
#
# ML/Python tests are intentionally omitted — they require a CUDA GPU (mamba/
# Triton initialise at import) that GitHub-hosted runners do not provide. Run
# them in the documented GPU one-off container instead.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: frontend
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install deps
        run: npm ci
      - name: TypeScript
        run: npx tsc --noEmit
      - name: ESLint (0 warnings)
        run: npx eslint --max-warnings=0 src/
      - name: i18n completeness (6 locales)
        run: node scripts/check-i18n.cjs
      - name: Vitest + coverage (enforces threshold)
        run: npx vitest run --coverage --pool=forks --poolOptions.forks.maxForks=2
        env:
          # GitHub-hosted runners have ~7GB RAM; cap heap below that so the
          # instrumented full-suite run doesn't OOM.
          NODE_OPTIONS: --max-old-space-size=5120

  backend:
    name: backend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Prisma generate
        run: npx prisma generate
      - name: TypeScript
        run: npm run type-check
      - name: Vitest + coverage (enforces threshold)
        run: npx vitest run --coverage
