name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  # ====================
  # Code Quality Checks
  # ====================
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npm run type-check

      - name: Check translations
        run: npm run i18n:validate
        continue-on-error: true # Allow warnings but continue workflow

  # ====================
  # Security Scanning
  # ====================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: NPM Audit - Frontend
        run: npm audit --audit-level=high

      - name: NPM Audit - Backend
        working-directory: ./backend
        run: npm audit --audit-level=high

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Python Safety Check
        working-directory: ./backend/segmentation
        continue-on-error: true # Don't fail the workflow on safety issues
        run: |
          if [ -f "requirements.txt" ]; then
            pip install safety
            pip install -r requirements.txt
            echo "Running safety check..."
            if safety check --file=requirements.txt --json; then
              echo "✓ No security vulnerabilities found"
            else
              echo "⚠️ Security vulnerabilities found but continuing workflow"
              echo "Please review the security report above and fix vulnerabilities when possible"
            fi
          else
            echo "Warning: requirements.txt not found in backend/segmentation"
            echo "Skipping Python safety check"
          fi

      - name: Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'

  # ====================
  # Unit Tests with Coverage
  # ====================
  unit-tests:
    name: Unit Tests with Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Frontend tests with coverage
        run: |
          npm run test:coverage -- --reporter=json --outputFile=coverage/frontend-coverage.json
          npm run test:coverage -- --reporter=lcov --coverage.reporter=lcov

      - name: Run Backend tests with coverage
        working-directory: ./backend
        run: |
          npm ci
          npm run test:coverage -- --reporter=json --outputFile=coverage/backend-coverage.json
          npm run test:coverage -- --reporter=lcov --coverage.reporter=lcov

      - name: Generate coverage summary
        run: |
          # Parse coverage data with error handling
          FRONTEND_COV=0
          BACKEND_COV=0
          
          if [ -f "./coverage/frontend-coverage.json" ]; then
            FRONTEND_COV=$(node -e "try { const cov=require('./coverage/frontend-coverage.json'); console.log(Math.floor(cov.total?.lines?.pct || 0)); } catch(e) { console.log(0); }")
          fi
          
          if [ -f "./backend/coverage/backend-coverage.json" ]; then
            BACKEND_COV=$(node -e "try { const cov=require('./backend/coverage/backend-coverage.json'); console.log(Math.floor(cov.total?.lines?.pct || 0)); } catch(e) { console.log(0); }")
          fi
          
          echo "## Test Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Coverage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|----------|--------|" >> $GITHUB_STEP_SUMMARY
          
          # Check frontend coverage
          if [ "$FRONTEND_COV" -ge 70 ]; then
            echo "| Frontend | ${FRONTEND_COV}% | ✅ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Frontend | ${FRONTEND_COV}% | ⚠️ |" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Check backend coverage
          if [ "$BACKEND_COV" -ge 60 ]; then
            echo "| Backend | ${BACKEND_COV}% | ✅ |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Backend | ${BACKEND_COV}% | ⚠️ |" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Calculate total coverage
          TOTAL_COV=$(( (FRONTEND_COV + BACKEND_COV) / 2 ))
          echo "| **Total** | **${TOTAL_COV}%** | - |" >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info,./backend/coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Archive coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage/
            backend/coverage/

  # ====================
  # Python ML Tests
  # ====================
  python-ml-tests:
    name: Python ML Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/segmentation/requirements.txt'

      - name: Install Python dependencies
        working-directory: ./backend/segmentation
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio
          # Verify installation
          python -c "import torch; print(f'PyTorch version: {torch.__version__}')"
          python -c "import cv2; print(f'OpenCV version: {cv2.__version__}')"
          python -c "import numpy; print(f'NumPy version: {numpy.__version__}')"

      - name: Run ML service tests
        working-directory: ./backend/segmentation
        run: |
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term

      - name: Upload Python coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/segmentation/coverage.xml
          flags: ml-tests
          name: ml-coverage

  # ====================
  # Integration Tests
  # ====================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd backend && npm ci

      - name: Setup test environment
        run: |
          cp .env.example .env.test || echo "# Test environment" > .env.test
          echo "DATABASE_URL=postgresql://postgres:testpass@localhost:5432/testdb" >> .env.test
          echo "REDIS_URL=redis://localhost:6379" >> .env.test
          echo "JWT_ACCESS_SECRET=test-jwt-access-secret-key-min-32-chars-long" >> .env.test
          echo "JWT_REFRESH_SECRET=test-jwt-refresh-secret-key-min-32-chars-long" >> .env.test
          cp .env.test backend/.env

      - name: Generate Prisma Client
        working-directory: ./backend
        run: npx prisma generate

      - name: Run database migrations
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/testdb
        run: npx prisma migrate deploy || npx prisma db push

      - name: Run integration tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/testdb
          JWT_ACCESS_SECRET: test-access-secret
          JWT_REFRESH_SECRET: test-refresh-secret
        run: npm run test:integration

  # ====================
  # E2E Tests
  # ====================
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Setup test environment
        run: |
          # Create necessary environment files
          cp .env.example .env || echo "# Test env" > .env
          echo "VITE_API_URL=http://localhost:3001" >> .env
          echo "VITE_ML_SERVICE_URL=http://localhost:8000" >> .env
          
          # Create backend env
          cp .env.example backend/.env || echo "# Backend test env" > backend/.env
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/spheroseg_test" >> backend/.env
          echo "JWT_ACCESS_SECRET=test-jwt-access-secret-key-min-32-chars-long" >> backend/.env
          echo "JWT_REFRESH_SECRET=test-jwt-refresh-secret-key-min-32-chars-long" >> backend/.env

      - name: Start test services
        run: |
          # Start PostgreSQL and Redis containers
          echo "Starting PostgreSQL..."
          docker run -d --name test-postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=spheroseg_test \
            -p 5432:5432 \
            postgres:15-alpine
          
          echo "Starting Redis..."
          docker run -d --name test-redis \
            -p 6379:6379 \
            redis:7-alpine
          
          # Wait for PostgreSQL to be ready
          echo "Waiting for PostgreSQL..."
          for i in {1..30}; do
            docker exec test-postgres pg_isready -U postgres && break
            echo "PostgreSQL not ready yet... ($i/30)"
            sleep 2
          done
          
          # Wait for Redis to be ready
          echo "Waiting for Redis..."
          for i in {1..30}; do
            docker exec test-redis redis-cli ping && break
            echo "Redis not ready yet... ($i/30)"
            sleep 2
          done
          
          echo "Test services are ready!"

      - name: Setup database
        run: |
          cd backend
          npx prisma migrate deploy
          npx prisma generate
          cd ..

      - name: Build and start application
        run: |
          # Build frontend
          npm run build
          
          # Start backend server
          cd backend
          npm run dev &
          BACKEND_PID=$!
          cd ..
          
          # Start frontend dev server for E2E tests
          npm run preview &
          FRONTEND_PID=$!
          
          # Store PIDs for cleanup
          echo $BACKEND_PID > backend.pid
          echo $FRONTEND_PID > frontend.pid
          
          # Wait for backend to be ready
          echo "Waiting for backend..."
          for i in {1..30}; do
            curl -f http://localhost:3001/health && break
            echo "Backend not ready yet... ($i/30)"
            sleep 2
          done
          
          # Wait for frontend to be ready
          echo "Waiting for frontend..."
          for i in {1..30}; do
            curl -f http://localhost:4173 && break
            echo "Frontend not ready yet... ($i/30)"
            sleep 2
          done
          
          echo "Application is ready for E2E tests!"

      - name: Run E2E tests
        run: |
          # Run Playwright tests against preview server
          VITE_API_URL=http://localhost:3001 npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Cleanup
        if: always()
        run: |
          # Stop application servers
          if [ -f backend.pid ]; then
            kill $(cat backend.pid) || true
            rm backend.pid
          fi
          if [ -f frontend.pid ]; then
            kill $(cat frontend.pid) || true
            rm frontend.pid
          fi
          
          # Stop and remove Docker containers
          docker stop test-postgres test-redis || true
          docker rm test-postgres test-redis || true

  # ====================
  # Build Docker Images
  # ====================
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-and-type-check, security-scan, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: cell-seg-hub/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: cell-seg-hub/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build ML Service Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/segmentation
          file: ./backend/segmentation/Dockerfile
          push: false
          tags: cell-seg-hub/ml-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify Docker Compose Configuration
        run: |
          echo "Verifying docker-compose configurations..."

          # Test main docker-compose configuration
          docker compose config

          # Test production configuration if it exists
          if [ -f "docker-compose.production.yml" ]; then
            echo "Validating production configuration..."
            docker compose -f docker-compose.production.yml config
          fi

          # Test test configuration if it exists
          if [ -f "docker-compose.test.yml" ]; then
            echo "Validating test configuration..."
            docker compose -f docker-compose.test.yml config
          fi

          echo "All Docker configurations are valid!"

      - name: Verify Build Success
        run: |
          echo "Docker image build verification completed successfully!"
          echo "Frontend image: cell-seg-hub/frontend:${{ github.sha }}"
          echo "Backend image: cell-seg-hub/backend:${{ github.sha }}"
          echo "ML Service image: cell-seg-hub/ml-service:${{ github.sha }}"

